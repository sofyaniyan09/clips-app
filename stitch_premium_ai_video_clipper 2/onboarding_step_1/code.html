<style>
        body {
            background-color: #0F0F12; /* Brand foundation */
            color: #e4e1e6; /* on-background */
        }
        
        .glass-panel {
            background: rgba(26, 26, 34, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .gradient-text {
            background: linear-gradient(135deg, #d0bcff 0%, #4cd7f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glow-accent {
            box-shadow: 0 0 30px rgba(76, 215, 246, 0.15);
        }
        
        .glow-border {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

<body class="min-h-screen flex flex-col items-center justify-between overflow-hidden relative">
<!-- Background Ambient Glow -->
<div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container rounded-full mix-blend-screen filter blur-[100px] opacity-20"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary-container rounded-full mix-blend-screen filter blur-[100px] opacity-20"></div>
</div>
<!-- TopAppBar -->
<header class="w-full top-0 left-0 bg-transparent flex justify-between items-center px-margin-mobile py-4 flat no shadows z-50">
<button aria-label="Close" class="w-10 h-10 flex items-center justify-center rounded-full glass-panel glow-border text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<button class="font-body-md text-body-md text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform">
            Skip
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md flex flex-col items-center justify-center px-margin-mobile z-10 relative">
<!-- Hero Element (Image Placeholder) -->
<div class="w-full aspect-square max-w-[320px] mb-lg relative glow-accent rounded-full flex items-center justify-center">
<img alt="AI Production Camera" class="w-full h-full object-contain filter drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCOtfNeokLHf6z8LDbGcqQvqM3fBZm420kP82sXy-SdcilbNPTXYJIQ4YTtA3RKVrFdtVETkRuDD97_eTh11tgbzKXmXNbWvJRdUzScBnlAWnr9V08MNDPhZLIrUuq_MRsP6s15sDMpG_63jFNA0V-fby4w1wiMutfPmRlk70tSqnprjaefVOLwN8LxTUxQEkxsGdOgrisEEzA7Si7aQbbKwwCvdAg0aXVxraF8G6kUxF3-gRhG7uMXcw"/>
</div>
<!-- Typography Block -->
<div class="text-center w-full max-w-[340px] space-y-sm">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile gradient-text tracking-tight">
                Automated<br/>Production Studio
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                One input, fully edited cinematic output. No manual editing needed.
            </p>
</div>
</main>
<!-- Bottom Navigation / Indicators -->
<!-- Note: BottomNavBar semantic shell is hidden as this is a linear/transactional onboarding screen. 
         However, the user prompt specifically requests the 3-dot indicators (from the bottom nav spec) to be present as progress indicators. -->
<footer class="w-full pb-lg pt-md flex flex-col items-center z-50 relative">
<!-- Next Button - Injected to provide a clear path forward in onboarding -->
<button class="w-[calc(100%-40px)] max-w-md mx-margin-mobile mb-lg py-4 rounded-xl bg-gradient-to-r from-inverse-primary to-secondary text-surface-container-lowest font-headline-sm text-headline-sm flex items-center justify-center gap-xs shadow-[0_0_20px_rgba(76,215,246,0.3)] hover:opacity-90 transition-all active:scale-[0.98]">
            Continue
            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Indicators -->
<div class="flex items-center gap-md">
<!-- Active Dot -->
<span class="material-symbols-outlined text-secondary bg-secondary/20 rounded-full scale-125 transition-transform duration-300" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
<!-- Inactive Dots -->
<span class="material-symbols-outlined text-outline opacity-30 transition-all duration-300 hover:text-secondary/50" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
<span class="material-symbols-outlined text-outline opacity-30 transition-all duration-300 hover:text-secondary/50" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
</div>
</footer>
