<style>
        .glass-overlay {
            background-color: rgba(19, 19, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .glow-border {
            position: relative;
        }
        .glow-border::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(to right, #a078ff, #4cd7f6);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .toggle-checkbox:checked {
            right: 0;
            border-color: #a078ff;
        }
        .toggle-checkbox:checked + .toggle-label {
            background: linear-gradient(to right, #a078ff, #4cd7f6);
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            border-color: white;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface antialiased h-screen w-screen flex items-end justify-center overflow-hidden">
<!-- Mock Background for context -->
<div class="absolute inset-0 z-0">
<div class="bg-cover bg-center w-full h-full opacity-30" data-alt="A professional video editing timeline interface in a dark, high-end software environment. Multiple video tracks with waveforms, colorful clip segments, and a glowing playhead. The mood is focused and technical, with a sleek dark mode aesthetic punctuated by neon UI elements. Soft ambient lighting." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAG5F8HRSwF8nICl3eomKlQmNUlZnZO70dw_itaqK0H5nXRogzO6oFMGgmlyzTWUyICCe6gL7uOBS6wAy_M6zk2rpQMB1AZUbIq35-44PdvHteqVVtRLegt1Vt9-_R8LXApjnkAgy4DZqaIfXGxRlzNRYOxQwwaDt_hsZCNWMDsv-s6SGLdeh6TnwH3JrO9tApoLHNgrhCIcVpUuYEa57UBjpTQclIJOWdu1YpzsrVtLDuC9vi58GVAfQ')"></div>
</div>
<div class="absolute inset-0 bg-background/50 z-0"></div>
<!-- Top App Bar (Suppressed as per rules: Transactional/Task-focused modal) -->
<!-- Bottom Sheet Modal -->
<div class="w-full max-w-md glass-overlay rounded-t-2xl z-50 flex flex-col pt-base pb-lg px-margin-mobile border-t border-white/10 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] transform transition-transform duration-300 translate-y-0">
<!-- Drag Handle -->
<div class="w-full flex justify-center mb-md">
<div class="w-12 h-1.5 bg-surface-variant rounded-full"></div>
</div>
<!-- Header -->
<div class="flex justify-between items-center mb-md">
<h2 class="font-headline-md text-headline-md text-on-surface">Export Settings</h2>
<button aria-label="Close" class="text-on-surface-variant hover:text-on-surface transition-colors p-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Resolution Section -->
<div class="mb-md">
<h3 class="font-label-md text-label-md text-on-surface-variant mb-sm uppercase tracking-wider">Resolution</h3>
<div class="flex gap-sm">
<!-- 720p Chip -->
<button class="flex-1 py-sm bg-surface-container rounded-lg border border-white/5 text-on-surface-variant font-body-md text-body-md hover:bg-surface-container-high transition-colors">
                    720p
                </button>
<!-- 1080p Chip (Active) -->
<button class="flex-1 py-sm bg-surface-container-high rounded-lg glow-border text-on-surface font-body-md text-body-md font-medium">
                    1080p
                </button>
<!-- 4K Chip (PRO) -->
<button class="flex-1 py-sm bg-surface-container rounded-lg border border-white/5 text-on-surface-variant font-body-md text-body-md relative hover:bg-surface-container-high transition-colors flex flex-col items-center justify-center">
<span>4K</span>
<span class="absolute -top-2 -right-2 bg-gradient-to-r from-primary-container to-secondary text-background font-label-sm text-label-sm px-1.5 py-0.5 rounded shadow-sm font-bold">PRO</span>
</button>
</div>
</div>
<!-- Subtitles Toggle -->
<div class="flex justify-between items-center py-sm mb-md border-b border-white/5">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 0;">subtitles</span>
<span class="font-body-lg text-body-lg text-on-surface">Burn-in Subtitles</span>
</div>
<!-- Custom Toggle Switch -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-transform duration-200 ease-in-out" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-variant cursor-pointer transition-colors duration-200 ease-in-out" for="toggle"></label>
</div>
</div>
<!-- Info Card -->
<div class="bg-surface-container-low rounded-xl p-sm mb-lg border border-white/5 flex flex-col gap-base">
<div class="flex items-center gap-sm text-on-surface-variant">
<span class="material-symbols-outlined text-tertiary-container" style="font-variation-settings: 'FILL' 0;">folder_zip</span>
<span class="font-body-md text-body-md">Estimated Size: <span class="text-on-surface font-medium">~24 MB</span></span>
</div>
<div class="flex items-center gap-sm text-on-surface-variant">
<span class="material-symbols-outlined text-tertiary-container" style="font-variation-settings: 'FILL' 0;">timer</span>
<span class="font-body-md text-body-md">Estimated Render Time: <span class="text-on-surface font-medium">~40 seconds</span></span>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-md rounded-xl bg-gradient-to-r from-primary-container to-secondary text-background font-headline-sm text-headline-sm font-bold shadow-[0_4px_20px_rgba(160,120,255,0.3)] hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">movie_filter</span>
            Start Rendering
        </button>
</div>
<!-- BottomNavBar (Suppressed as per rules: Transactional/Task-focused modal) -->
</body></html>
